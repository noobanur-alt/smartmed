<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMed – My Medicines</title>
  <script src="auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; }
    
    .sidebar {
      width: 220px; background: #1a73e8; min-height: 100vh; padding: 24px 0; position: fixed; top: 0; left: 0;
    }
    .sidebar-logo { color: white; font-size: 22px; font-weight: 700; padding: 0 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .sidebar-logo span { font-size: 11px; display: block; font-weight: 400; opacity: 0.75; margin-top: 3px; }
    .sidebar-user { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 8px; }
    .user-avatar { width: 44px; height: 44px; background: rgba(255,255,255,0.25); border-radius: 50%; color: white; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
    .user-name { color: white; font-size: 14px; font-weight: 600; }
    .user-age { color: rgba(255,255,255,0.65); font-size: 11px; margin-top: 2px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: rgba(255,255,255,0.8); font-size: 14px; cursor: pointer; text-decoration: none; }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
    .nav-section { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); padding: 14px 24px 4px; }

    .main { margin-left: 220px; flex: 1; padding: 28px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .topbar h2 { font-size: 22px; color: #1e293b; }
    .add-btn { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }

    .med-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .med-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; width: 460px; border-radius: 12px; padding: 28px; }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #374151; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-cancel { flex: 1; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; background: white; }
    .btn-save { flex: 1; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: 600; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">SmartMed <span>My Medicine Manager</span></div>
    <div class="sidebar-user">
      <div class="user-avatar">AS</div>
      <div class="user-name">Anurag Sharma</div>
      <div class="user-age">Age 22 · Patient ID: SM-001</div>
    </div>
    <div class="nav-section">MY HEALTH</div>
    <a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
    <a class="nav-item active" href="medicines.html">💊 My Medicines</a>
    <a class="nav-item" href="schedule.html">📅 My Schedule</a>
    <a class="nav-item" href="device.html">📦 My SmartMed Box</a>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="topbar">
      <div>
        <h2>💊 My Medicines</h2>
        <p>Manage all your medicines and schedules in one place.</p>
      </div>
      <button class="add-btn" onclick="openModal()">+ Add Medicine</button>
    </div>

    <div class="med-grid" id="medGrid"></div>
  </div>

  <!-- Add Medicine Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">
        Add New Medicine
        <span onclick="closeModal()" style="cursor:pointer; font-size:28px; color:#94a3b8;">×</span>
      </div>
      
      <div class="form-group">
        <label>Medicine Name</label>
        <input type="text" id="medName" placeholder="e.g. Paracetamol">
      </div>
      
      <div class="form-group">
        <label>Reminder Time (24-hour format)</label>
        <input type="time" id="medTime" required>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveMedicine()">Save Medicine</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('smartmed_token');
    if (!token) window.location.href = 'index.html';

    async function api(endpoint, method = 'GET', body = null) {
      try {
        const res = await fetch(`https://smartmed-backend-wute.onrender.com${endpoint}`, {
          method: method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: body ? JSON.stringify(body) : null
        });
        const data = await res.json();
        console.log("API Response:", data);
        return data;
      } catch (err) {
        console.error("API Error:", err);
        return { success: false, message: err.message };
      }
    }

    async function saveMedicine() {
      const name = document.getElementById('medName').value.trim();
      const time = document.getElementById('medTime').value;

      if (!name || !time) {
        alert("Please enter Medicine Name and Reminder Time");
        return;
      }

      try {
        const result = await api('/api/device/schedule', 'POST', {
          medicine: name,
          time: time,
          status: "pending"
        });

        if (result.success) {
          alert("✅ Medicine added successfully!");
          closeModal();
          document.getElementById('medName').value = '';
          document.getElementById('medTime').value = '';
        } else {
          alert("Failed to save: " + (result.message || "Unknown error"));
        }
      } catch (err) {
        alert("Cannot connect to server");
      }
    }

    function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    // Load existing medicines (optional)
    async function loadMedicines() {
      console.log("Medicines page loaded");
    }

    loadMedicines();
  </script>
</body>
</html>
