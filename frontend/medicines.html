<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMed – My Medicines</title>
  <script src="auth.js"></script>
  <style>
    /* Your existing styles (unchanged) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; }
    .sidebar { width: 220px; background: #1a73e8; min-height: 100vh; padding: 24px 0; position: fixed; top: 0; left: 0; }
    .sidebar-logo { color: white; font-size: 22px; font-weight: 700; padding: 0 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .sidebar-logo span { font-size: 11px; display: block; font-weight: 400; opacity: 0.75; margin-top: 3px; }
    .sidebar-user { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 8px; }
    .user-avatar { width: 44px; height: 44px; background: rgba(255,255,255,0.25); border-radius: 50%; color: white; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
    .user-name { color: white; font-size: 14px; font-weight: 600; }
    .user-age { color: rgba(255,255,255,0.65); font-size: 11px; margin-top: 2px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: rgba(255,255,255,0.8); font-size: 14px; cursor: pointer; transition: background 0.15s; text-decoration: none; }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
    .nav-section { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); padding: 14px 24px 4px; }
    .main { margin-left: 220px; flex: 1; padding: 28px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .topbar h2 { font-size: 22px; color: #1e293b; }
    .topbar p { font-size: 13px; color: #64748b; margin-top: 3px; }
    .add-btn { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .add-btn:hover { background: #1558b0; }
    .med-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .med-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; }
  </style>
</head>
<body>

  <!-- Sidebar (same as yours) -->
  <div class="sidebar">
    <div class="sidebar-logo">SmartMed <span>My Medicine Manager</span></div>
    <div class="sidebar-user">
      <div class="user-avatar">AS</div>
      <div class="user-name">Anurag Sharma</div>
      <div class="user-age">Age 22 · Patient ID: SM-001</div>
    </div>
    <div class="nav-section">My Health</div>
    <a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
    <a class="nav-item active" href="medicines.html">💊 My Medicines</a>
    <a class="nav-item" href="schedule.html">📅 My Schedule</a>
    <a class="nav-item" href="device.html">📦 My SmartMed Box</a>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <h2>💊 My Medicines</h2>
        <p>Manage all your medicines and schedules in one place.</p>
      </div>
      <button class="add-btn" onclick="openModal()">+ Add Medicine</button>
    </div>
    <div class="med-grid" id="medGrid"></div>
  </div>

  <!-- Add Medicine Modal (simplified & fixed) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">
        Add New Medicine
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Medicine Name</label>
        <input type="text" id="medName" placeholder="e.g. Paracetamol">
      </div>
      <div class="form-group">
        <label>Reminder Time (24h format)</label>
        <input type="time" id="medTime" required>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveMedicine()">Save Medicine</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('smartmed_token');
    if (!token) window.location = 'index.html';

    async function api(endpoint, method = 'GET', body = null) {
      const options = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        }
      };
      if (body) options.body = JSON.stringify(body);
      const res = await fetch(`https://smartmed-backend-wute.onrender.com${endpoint}`, options);
      return res.json();
    }

    async function loadMedicines() {
      // ... (keep your existing loadMedicines if you want)
      console.log("Medicines loaded");
    }

    async function saveMedicine() {
      const name = document.getElementById('medName').value.trim();
      const time = document.getElementById('medTime').value;   // e.g. "23:05"

      if (!name || !time) {
        alert("Please enter medicine name and time");
        return;
      }

      try {
        // Save Medicine
        await api('/api/medicines', 'POST', { name, dosage: "500mg", quantity: "1 tablet" });

        // Save Schedule for ESP32
        const scheduleData = {
          medicine: name,
          time: time,           // Important: HH:mm format
          status: "pending"
        };

        const res = await api('/api/device/schedule', 'POST', scheduleData);
        console.log("Schedule saved:", res);

        alert("Medicine & Schedule added successfully!");
        closeModal();
        loadMedicines();
      } catch (err) {
        alert("Error saving: " + err.message);
      }
    }

    function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    loadMedicines();
  </script>
</body>
</html>
