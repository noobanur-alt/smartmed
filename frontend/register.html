<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMed – Register</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .register-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 420px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 28px; color: #1a73e8; }
    .logo p  { font-size: 13px; color: #888; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 13px;
      color: #555; margin-bottom: 6px; font-weight: 500;
    }
    input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #1a73e8; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      width: 100%; padding: 12px;
      background: #1a73e8; color: white;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 6px;
      transition: background 0.2s;
    }
    button:hover { background: #1558b0; }
    button:disabled { background: #93b4f0; cursor: not-allowed; }
    .footer-text {
      text-align: center; font-size: 13px;
      color: #888; margin-top: 16px;
    }
    .footer-text a { color: #1a73e8; text-decoration: none; font-weight: 500; }
    #msgBox {
      display: none; padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="register-box">
    <div class="logo">
      <h1>SmartMed</h1>
      <p>Create your account</p>
    </div>

    <div id="msgBox"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Anurag Sharma">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@email.com">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="22">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="9876543210">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Minimum 6 characters">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password">
    </div>

    <button id="registerBtn" onclick="register()">Create Account</button>

    <div class="footer-text">
      Already have an account? <a href="index.html">Login here</a>
    </div>
  </div>

  <script>
    async function register() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const age      = document.getElementById('age').value;
      const phone    = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('registerBtn');

      if (!name || !email || !password) {
        showMsg('Please fill in all required fields.', 'error'); return;
      }
      if (password.length < 6) {
        showMsg('Password must be at least 6 characters.', 'error'); return;
      }
      if (password !== confirm) {
        showMsg('Passwords do not match.', 'error'); return;
      }

      btn.textContent = 'Creating account...';
      btn.disabled    = true;

      try {
        const response = await fetch('http://localhost:5000/api/auth/register', {
          method  : 'POST',
          headers : { 'Content-Type': 'application/json' },
          body    : JSON.stringify({ name, email, password, age, phone })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('smartmed_token', data.token);
          localStorage.setItem('smartmed_user',  JSON.stringify(data.user));
          showMsg('Account created! Redirecting to dashboard...', 'success');
          setTimeout(() => window.location = 'dashboard.html', 1500);
        } else {
          showMsg(data.message || 'Registration failed.', 'error');
          btn.textContent = 'Create Account';
          btn.disabled    = false;
        }

      } catch (err) {
        showMsg('Cannot connect to server. Make sure backend is running.', 'error');
        btn.textContent = 'Create Account';
        btn.disabled    = false;
      }
    }

    function showMsg(text, type) {
      const box = document.getElementById('msgBox');
      box.style.display    = 'block';
      box.style.background = type === 'success' ? '#dcfce7' : '#fee2e2';
      box.style.color      = type === 'success' ? '#16a34a' : '#dc2626';
      box.textContent      = text;
    }
  </script>
</body>
</html>
