<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMed – Login</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 28px;
      color: #1a73e8;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #1a73e8;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #1558b0;
    }

    button:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 20px;
    }

  </style>
</head>

<body>

  <div class="login-box">

    <div class="logo">
      <h1>SmartMed</h1>
      <p>Intelligent Medicine Monitoring System</p>
    </div>

    <!-- Message Box -->
    <div id="msgBox"
      style="
      display:none;
      padding:10px 14px;
      border-radius:8px;
      font-size:13px;
      margin-bottom:16px;
      text-align:center">
    </div>

    <div class="form-group">
      <label>Email Address</label>

      <input
        type="email"
        id="email"
        placeholder="you@email.com">
    </div>

    <div class="form-group">
      <label>Password</label>

      <input
        type="password"
        id="password"
        placeholder="Enter your password">
    </div>

    <button id="loginBtn" onclick="login()">
      Login
    </button>

    <div
      style="
      text-align:center;
      margin-top:16px;
      font-size:13px;
      color:#888">

      No account?

      <a href="register.html"
        style="
        color:#1a73e8;
        text-decoration:none;
        font-weight:500">

        Register here

      </a>

    </div>

    <div class="footer-text">
      SmartMed v1.0 &nbsp;|&nbsp; Authorized Personnel Only
    </div>

  </div>

  <script>

    // Redirect if already logged in
    if (localStorage.getItem('smartmed_token')) {
      window.location = 'dashboard.html';
    }

    async function login() {

      const email =
        document.getElementById('email').value.trim();

      const password =
        document.getElementById('password').value;

      const btn =
        document.getElementById('loginBtn');

      // Validation
      if (!email || !password) {

        showMsg(
          'Please enter your email and password.',
          'error'
        );

        return;
      }

      // Loading state
      btn.textContent = 'Logging in...';
      btn.disabled = true;

      try {

        const response = await fetch(
          'http://localhost:5000/api/auth/login',
          {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              email,
              password
            })
          }
        );

        const data = await response.json();

        if (data.success) {

          // Save token
          localStorage.setItem(
            'smartmed_token',
            data.token
          );

          // Save user
          localStorage.setItem(
            'smartmed_user',
            JSON.stringify(data.user)
          );

          showMsg(
            'Login successful! Redirecting...',
            'success'
          );

          // Redirect
          setTimeout(() => {
            window.location = 'dashboard.html';
          }, 1000);

        } else {

          showMsg(
            data.message || 'Login failed.',
            'error'
          );

          btn.textContent = 'Login';
          btn.disabled = false;
        }

      } catch (err) {

        showMsg(
          'Cannot connect to server. Make sure backend is running.',
          'error'
        );

        btn.textContent = 'Login';
        btn.disabled = false;
      }
    }

    function showMsg(text, type) {

      const box =
        document.getElementById('msgBox');

      box.style.display = 'block';

      box.style.background =
        type === 'success'
          ? '#dcfce7'
          : '#fee2e2';

      box.style.color =
        type === 'success'
          ? '#16a34a'
          : '#dc2626';

      box.textContent = text;
    }

    // Press Enter to login
    document.addEventListener(
      'keypress',
      function(e) {

        if (e.key === 'Enter') {
          login();
        }

      }
    );

  </script>

</body>
</html>
