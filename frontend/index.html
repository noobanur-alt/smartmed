<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartMed – Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 28px;
      color: #1a73e8;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: #1a73e8;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #1558b0;
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">
      <h1>SmartMed</h1>
      <p>Intelligent Medicine Monitoring System</p>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" placeholder="doctor@hospital.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password">
    </div>

    <button>Login</button>

    <div class="footer-text">
      SmartMed v1.0 &nbsp;|&nbsp; Authorized Personnel Only
    </div>
  </div>

</body>
</html>
